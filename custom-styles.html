<script>
function toggleNavMenu() {
  const menu = document.getElementById('nav-menu');
  const list = document.getElementById('slide-list');
  
  if (!menu.classList.contains('open')) {
    list.innerHTML = '';
    const slides = document.querySelectorAll('.reveal .slides > section');

    slides.forEach((slide, index) => {
      const customEl = slide.querySelector('.slide-title');
      const custom = customEl ? customEl.getAttribute('data-title') : null;

      const header = slide.querySelector('h1, h2, h3, h4');

      let title = "Slide " + (index + 1);

      if (custom) title = custom;
      else if (header) title = header.innerText.trim();

      if (index === 0) title = "🏠 Home (Title)";

      const li = document.createElement('li');
      li.innerHTML = `<a href="#/${index}" onclick="toggleNavMenu()">${title}</a>`;
      list.appendChild(li);
    });
    menu.classList.add('open');
  } else {
    menu.classList.remove('open');
  }
}
</script>

<canvas id="annotator"
        style="position:fixed; top:0; left:0; width:100%; height:100%;
               pointer-events:none; z-index: 1000;"></canvas>

<script>
  const c = document.getElementById('annotator');
  const ctx = c.getContext('2d');
  let draw = false;

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  window.addEventListener('mousedown', e => {
    if (e.shiftKey) {
      draw = true;
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(e.clientX, e.clientY);
    }
  });

  window.addEventListener('mousemove', e => {
    if (draw) {
      ctx.lineTo(e.clientX, e.clientY);
      ctx.stroke();
    }
  });

  window.addEventListener('mouseup', () => draw = false);

  window.addEventListener('keydown', e => {
    if (e.key === 'c') {
      ctx.clearRect(0, 0, c.width, c.height);
    }
  });
</script>

<style>
  #media-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.55);
    z-index: 5000;
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 0.25s ease-out;
  }

  #media-overlay.visible {
    display: flex;
    opacity: 1;
  }

  #media-overlay.hidden {
    opacity: 0;
  }

  #media-overlay .overlay-frame-wrapper {
    width: 90vw;
    height: 90vh;
    background: white;
    box-shadow: 0 0 25px rgba(0,0,0,0.35);
    position: relative;
    border-radius: 6px;
    overflow: hidden;
  }

  #media-overlay iframe,
  #media-overlay img,
  #media-overlay video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border: none;
  }

  #media-overlay .close-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    z-index: 10;
    background: rgba(255,255,255,0.9);
    border: 1px solid #333;
    padding: 4px 10px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 4px;
  }

  #media-overlay .close-btn:hover {
    background: #f0f0f0;
  }

  .media-container {
    position: relative;
    display: block;
    width: 100%;
  }

  .media-container > iframe,
  .media-container > img,
  .media-container > video {
    display: block;
    width: 100%;
  }

  .viewlarge-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 50;
    background: rgba(255,255,255,0.85);
    border: 1px solid #333;
    padding: 4px 8px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .media-container:hover .viewlarge-btn {
    opacity: 1;
  }
</style>

<div id="media-overlay"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('media-overlay');

  function openOverlay(element) {
    overlay.innerHTML = '';

    const frameWrapper = document.createElement('div');
    frameWrapper.className = 'overlay-frame-wrapper';

    const closeBtn = document.createElement('button');
    closeBtn.className = 'close-btn';
    closeBtn.innerText = '✕ Close';

    const clone = element.cloneNode(true);

// Handle Reveal.js lazy-loaded videos
if (clone.tagName === 'VIDEO') {
  // If Reveal hasn't loaded it yet
  if (clone.dataset.src && !clone.src) {
    clone.src = clone.dataset.src;
    clone.removeAttribute('data-src');
  }

  // Ensure controls + muted autoplay
  clone.setAttribute('controls', 'controls');
  clone.muted = true;

  // Play once metadata is ready
  clone.addEventListener('loadeddata', () => {
    clone.play().catch(() => {});
  });
}

// Handle Reveal.js lazy-loaded iframes (Plotly)
if (clone.tagName === 'IFRAME') {
  if (clone.dataset.src && !clone.src) {
    clone.src = clone.dataset.src;
    clone.removeAttribute('data-src');
  }
}


    frameWrapper.appendChild(closeBtn);
    frameWrapper.appendChild(clone);
    overlay.appendChild(frameWrapper);

    overlay.classList.remove('hidden');
    overlay.style.display = 'flex';
    requestAnimationFrame(() => {
      overlay.classList.add('visible');
    });

    closeBtn.addEventListener('click', closeOverlay);
  }

  function closeOverlay() {
    overlay.classList.remove('visible');
    overlay.classList.add('hidden');
    setTimeout(() => {
      overlay.style.display = 'none';
      overlay.innerHTML = '';
    }, 250);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && overlay.classList.contains('visible')) {
      closeOverlay();
    }
  });

  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeOverlay();
  });

  function wrapMedia(element) {
    if (element.parentElement.classList.contains('media-container')) return;

    const wrapper = document.createElement('div');
    wrapper.className = 'media-container';

    element.parentNode.insertBefore(wrapper, element);
    wrapper.appendChild(element);

    const btn = document.createElement('button');
    btn.className = 'viewlarge-btn';
    btn.innerText = '⛶ View Large';
    wrapper.appendChild(btn);

    btn.addEventListener('click', e => {
      e.stopPropagation();
      openOverlay(element);
    });
  }

  // Plotly iframes
  document.querySelectorAll("iframe[data-src*='media/plots/'], iframe[src*='media/plots/']").forEach(frame => {
    wrapMedia(frame);
  });

  // Images (including title slide)
  document.querySelectorAll("img").forEach(img => {
    wrapMedia(img);
  });

  // Videos (Reveal uses data-src)
  document.querySelectorAll("video, video[data-src]").forEach(video => {
    wrapMedia(video);
  });
});
</script>
